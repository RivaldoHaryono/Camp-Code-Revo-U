<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="Style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <header class="app-header">
      <h1>💰 Expense & Budget Visualizer</h1>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">🌙</button>
    </header>

    <section class="balance-card">
      <p class="balance-label">TOTAL BALANCE</p>
      <h2 class="balance-amount" id="totalBalance">Rp 0</h2>
    </section>

    <section class="card form-card">
      <h3>Add Transaction</h3>
      <div class="form-group">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" placeholder="e.g. Nasi Goreng" />
      </div>
      <div class="form-group">
        <label for="amount">Amount (Rp)</label>
        <input type="number" id="amount" placeholder="e.g. 15000" min="0" />
      </div>
      <div class="form-group">
        <label for="category">Category</label>
        <div class="category-row">
          <select id="category"></select>
          <button class="btn-add-cat" id="addCatBtn" title="Add custom category">＋</button>
        </div>
      </div>
      <div class="form-group custom-cat-row hidden" id="customCatRow">
        <input type="text" id="customCatInput" placeholder="New category name..." />
        <button class="btn-save-cat" id="saveCatBtn">Save</button>
      </div>
      <button class="btn-primary" id="addBtn">Add Transaction</button>
    </section>

    <div class="main-content">
      <section class="card list-card">
        <div class="list-header">
          <h3>Transactions</h3>
          <div class="sort-row">
            <label for="sortSelect">Sort:</label>
            <select id="sortSelect">
              <option value="default">Latest</option>
              <option value="amount-asc">Amount ↑</option>
              <option value="amount-desc">Amount ↓</option>
              <option value="category">Category</option>
            </select>
          </div>
        </div>
        <div class="transaction-list" id="transactionList">
          <p class="empty-state">No transactions yet. Add one above!</p>
        </div>
      </section>

      <section class="card chart-card">
        <h3>Spending by Category</h3>
        <div class="chart-wrapper">
          <canvas id="spendingChart"></canvas>
          <p class="empty-state hidden" id="chartEmpty">No data to display yet.</p>
        </div>
      </section>
    </div>
  </div>

  <script src="script.java"></script>
</body>
</html>
